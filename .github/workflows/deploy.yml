name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Pages
        uses: actions/configure-pages@v5

      - name: Upload de l'artefact (site statique)
        uses: actions/upload-pages-artifact@v3
        with:
          # La racine du repo contient déjà index.html et le dossier assets/
          path: .

      - name: Déploiement vers GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
